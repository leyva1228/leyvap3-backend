services:
  - type: web
    name: leyvap3-backend
    env: python
    region: oregon
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py create_superusers
      python manage.py collectstatic --noinput

    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0

      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DJANGO_DEBUG
        value: "False"

      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"

      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "http://localhost:5173,https://leyvap3-frontend.vercel.app"

      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://leyvap3-backend.onrender.com,https://leyvap3-frontend.vercel.app"

      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: leyvap3-db
          property: connectionString

databases:
  - name: leyvap3-db
    region: oregon
    plan: free
    databaseName: leyvap3
    user: leyvap3_user